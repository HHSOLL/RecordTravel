name: mobile_app
description: Travel Atlas mobile app shell.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  image_picker: ^1.2.1
  native_exif: ^0.7.0
  sqlite3_flutter_libs: ^0.5.39
  supabase_flutter: ^2.10.2
  core_navigation:
    path: ../../packages/core_navigation
  core_ui:
    path: ../../packages/core_ui
  core_domain:
    path: ../../packages/core_domain
  core_data:
    path: ../../packages/core_data
  feature_atlas_home:
    path: ../../packages/feature_atlas_home
  feature_timeline:
    path: ../../packages/feature_timeline
  feature_journal:
    path: ../../packages/feature_journal
  feature_places:
    path: ../../packages/feature_places
  feature_search:
    path: ../../packages/feature_search
  feature_account:
    path: ../../packages/feature_account

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
